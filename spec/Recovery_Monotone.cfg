\* Safe reclaim, checking NON-CREATION as a transition property. Expect VIOLATED: a reclaim
\* raises A while staying ≤ CAP -> monotonicity fails but Safety holds. Counterexample to
\* "every A increase is unsafe" and to "monotonicity is necessary".
SPECIFICATION Spec
CONSTANTS Replicas = {r1, r2}  CAP = 3  Amounts = {1, 2}  SafeReclaim = TRUE
PROPERTY MonotoneA
