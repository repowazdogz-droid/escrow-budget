\* Sender-side idempotency OFF, receiver-side ON, checking the EXACT Conserved equality.
\* Expected: Conserved is VIOLATED  -->  sender idempotency IS necessary for conservation
\* (no-budget-lost), even though it is NOT necessary for Safety/SafetyLe (see the sibling cfg).
\* This is the smallest counterexample separating the two properties.
SPECIFICATION Spec
