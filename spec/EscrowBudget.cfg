\* TLC bounded model-checking config for the correct escrow protocol.
\* Invariants Conserved and Safety must hold on every reachable state.
\* Inductive (= TypeOK /\ Conserved /\ NetTidsSent) is the inductive certificate; TLC checks
\* it is TRUE on all reachable states, Apalache separately certifies it is INDUCTIVE at these
\* exact constants. See spec/EscrowBudget.tla and scripts/apalache-inductive.sh.
SPECIFICATION Spec
CONSTANTS
  Replicas = {r1, r2}
  CAP = 2
  Cids = {c1, c2}
  Tids = {t1, t2}
INVARIANT TypeOK
INVARIANT Conserved
INVARIANT Safety
INVARIANT NetTidsSent
INVARIANT Inductive
