\* Safe (guarded) reclaim: the chosen safety quantity is model-checked. Expect Safety+Bound HOLD.
\* Cert (= TypeOK /\ ConservedTotal) is the INDUCTIVE certificate for Bound. Bound itself is
\* true here but NOT inductive; TLC checks Cert is true on all reachable states, Apalache
\* separately certifies it is inductive at these exact constants. See scripts/apalache-inductive.sh.
SPECIFICATION Spec
CONSTANTS Replicas = {r1, r2}  CAP = 3  Amounts = {1, 2}  SafeReclaim = TRUE
INVARIANT TypeOK
INVARIANT Safety
INVARIANT Bound
INVARIANT ConservedTotal
INVARIANT Cert
