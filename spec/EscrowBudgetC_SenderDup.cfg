\* Sender-side idempotency OFF (non-idempotent retries re-debit), receiver-side ON.
\* Expected: Safety and SafetyLe HOLD  -->  sender idempotency is UNNECESSARY for the cap.
\* (Conserved is expected to FAIL here; that is checked separately in
\*  EscrowBudgetC_SenderDupConserved.cfg.)
SPECIFICATION Spec
CONSTANTS
  Replicas = {r1, r2}
  CAP = 2
  Cids = {c1, c2}
  Tids = {t1}
  Amounts = {1, 2}
  SenderIdemp = FALSE
  ReceiverIdemp = TRUE
INVARIANT TypeOK
INVARIANT Safety
INVARIANT SafetyLe
