\* Debit NOT persisted before send: a crash after send reverts the debit while the message is in
\* flight. Expected: SafetyLe VIOLATED by a SENDER-side crash (budget CREATED). This is the
\* falsifier of the narrow "receiver-side faults are the only safety-critical faults" reading.
SPECIFICATION Spec
CONSTANTS
  Replicas = {r1, r2}
  CAP = 2
  Tids = {t1}
  Amounts = {1, 2}
  DebitDurableBeforeSend = FALSE
  RecvdDurable = TRUE
INVARIANT SafetyLe
